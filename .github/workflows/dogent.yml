---
# yamllint disable rule:line-length
name: dogent
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  dogent:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        model:
          - gpt-4.1-mini
          - gpt-4o
          - gpt-4.1
          - gpt-5.4-mini
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-color
      - run: npm test --no-color
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ matrix.model }}
      - run: node src/dogent.js CLAUDE.md
