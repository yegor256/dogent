---
name: dogent
"on":
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  dogent:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - run: npm run lint
      - run: node src/dogent.js CLAUDE.md
